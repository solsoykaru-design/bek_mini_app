<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FoodChain</title>
  <script type="text/javascript">
    var segmentCount = 0;
    var l = window.location;
    location.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?r=' +
      btoa(l.pathname + l.search) + '#' + l.hash
    );
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
