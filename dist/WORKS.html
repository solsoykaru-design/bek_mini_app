<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✅ FoodChain работает!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
    }
    h1 {
      color: #667eea;
      font-size: 2.5em;
      margin-bottom: 20px;
      text-align: center;
    }
    .status {
      background: #4CAF50;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: center;
      font-size: 1.2em;
    }
    .links {
      margin-top: 30px;
    }
    .links a {
      display: block;
      background: #667eea;
      color: white;
      text-decoration: none;
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
      transition: all 0.3s;
    }
    .links a:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }
    .info {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 0.9em;
    }
    code {
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ FoodChain</h1>
    <div class="status">
      GitHub Pages работает!
    </div>
    <div class="links">
      <a href="./index.html">🚀 Открыть приложение</a>
      <a href="./test.html">🧪 Тестовая страница</a>
    </div>
    <div class="info">
      <strong>URL:</strong> <code>solsoykaru-design.github.io/mini_bot/</code><br><br>
      <strong>Файлы должны быть:</strong><br>
      ✓ index.html<br>
      ✓ 404.html<br>
      ✓ test.html<br>
      ✓ WORKS.html
    </div>
  </div>
</body>
</html>
