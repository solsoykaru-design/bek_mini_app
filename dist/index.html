<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Моё мини-приложение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Привет, Telegram!</h1>
    <button onclick="sendData()">Отправить данные боту</button>
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        function sendData() {
            tg.sendData("Привет от мини-приложения!");
            tg.close();
        }
    </script>
</body>
</html>
